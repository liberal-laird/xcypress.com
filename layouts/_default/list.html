{{ define "main" }}
<div class="container">
    <div class="list-page">
        <div class="list-header">
            <h1>{{ .Title }}</h1>
            {{ if .Description }}
            <p>{{ .Description }}</p>
            {{ end }}
        </div>

        <div class="list-content">
            {{ .Content }}
        </div>
    </div>
</div>
{{ end }}
